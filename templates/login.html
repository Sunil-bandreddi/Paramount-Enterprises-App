{% extends 'base.html' %}
{% block title %}Investor Login | Paramount Enterprises{% endblock %}

{% block content %}
<section class="page-shell" style="max-width: 520px;">
    <div class="form-card">
        <div class="form-heading">
            <span class="brand-mark">P</span>
            <h1>Investor Login</h1>
            <p>Access your Paramount investment dashboard</p>
        </div>

        {% if error %}
            <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="field">
                <label for="id_username">Email</label>
                <input id="id_username" name="username" placeholder="Enter your Email" required>
            </div>

            <div class="field" style="margin-top: 18px;">
                <label for="id_password">Password</label>
                <input id="id_password" type="password" name="password" placeholder="Password" required>
            </div>

            <button class="primary-button" type="submit">Login</button>
        </form>
    </div>
</section>
{% endblock %}
